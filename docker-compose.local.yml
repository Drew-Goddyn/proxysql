version: '3.8'

services:
  proxysql-local:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "6033:6033"
      - "6032:6032"
    volumes:
      - proxysql-data:/var/lib/proxysql

volumes:
  proxysql-data:
    driver: local

networks:
  proxysql-net:
    driver: bridge 